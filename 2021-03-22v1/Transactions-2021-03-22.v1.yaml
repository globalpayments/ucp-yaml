      examples:
        - '4895370019060711'
    network_token_expiry_month_TRANSACTIONS.payment_method.card.network_token_expiry_month:
      type: string
      description: The 2 digit expiry date month of the network token.
      examples:
        - '12'
    network_token_expiry_year_TRANSACTIONS.payment_method.card.network_token_expiry_year:
      type: string
      description: The 2 digit expiry date year of the network token.
      examples:
        - '30'
    swipe_reason_TRANSACTIONS.payment_method.card.swipe_reason:
      type: string
      enum:
        - TERMINAL_CONNECTION_ERROR
        - CARD_COMPATIBILITY_ERROR
      title: swipe_reason_TRANSACTIONS.payment_method.card.swipe_reason
      description: |-
        The condition that caused the chip or POS reader to fail. When this happens, the POS device offers a fallback option and provides the fallback condition.
        * `TERMINAL_CONNECTION_ERROR` - Failure due to connection issues.The ICC and terminal could not exchange EMV data with each other to complete a flow.
        * `CARD_COMPATIBILITY_ERROR` - Failure due to compatibiliyt issues.The ICC and terminal do not share a common AID that would have allowed a transaction to happen
    payment_account_reference_mode_TRANSACTIONS.payment_method.card.payment_account_reference_mode:
