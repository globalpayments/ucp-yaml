      examples:
        - foyer
    city_TRANSACTIONS.payment_method.bank_transfer.bank.address.city:
      type: string
      description: The city associated with the address.
      examples:
        - Beverly Hills
    state_TRANSACTIONS.payment_method.bank_transfer.bank.address.state:
      type: string
      description: 'The state or region of the address. ISO 3166-2 minus the country code itself. For example, US Illinois = IL, or in the case of GB counties Wiltshire = WI or Aberdeenshire = ABD'
      examples:
        - CA
    postal_code_TRANSACTIONS.payment_method.bank_transfer.bank.address.postal_code:
