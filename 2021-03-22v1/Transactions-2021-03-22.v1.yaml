  '/transactions/{id}/release':
    post:
      tags:
        - Release a Transaction
      summary: |
        This request will return a transaction to it's previous state before it was set to to PENDING_REVIEW (HELD). 
      description: |-
        If a transaction is set to PENDING_REVIEW (Held), the release request will return the transaction to its original status. 
        For example, if a transaction was set to automatically capture (capture_mode=AUTO), then the release request will return it to a status of CAPTURED.
        If you're using differect capture_modes,  MULTIPLE or LATER, the transaction will simply return to the PREAUTHRORIZED status. 
        Transactions that are held must be released before they are captured.

        This functionality is only available for Card Not Present (CNP) transactions in the UK, US, CA and EU.
      operationId: post-transactions-id-release
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/X-GP-Idempotency'
        - $ref: '#/components/parameters/X-GP-Version'
        - $ref: '#/components/parameters/Content-type'
        - $ref: '#/components/parameters/Accept'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason_code:
                  $ref: '#/components/schemas/reason_code_TRANSACTIONS.reason_code'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: '#/components/schemas/id_TRANSACTIONS.id'
                  time_created:
                    $ref: '#/components/schemas/time_created_TRANSACTIONS.time_created'
                  type:
                    $ref: '#/components/schemas/type_TRANSACTIONS.type'
                  status:
                    $ref: '#/components/schemas/status_TRANSACTIONS.status'
                  amount:
                    $ref: '#/components/schemas/amount_TRANSACTIONS.amount'
                  currency:
                    $ref: '#/components/schemas/currency_TRANSACTIONS.currency'
                  country:
                    $ref: '#/components/schemas/country_TRANSACTIONS.country'
                  reference:
                    $ref: '#/components/schemas/reference_TRANSACTIONS.reference'
                  risk_assessment:
                    type: array
                    items:
                      type: object
                      properties:
                        result:
                          $ref: '#/components/schemas/result_TRANSACTIONS.risk_assessment.result'
                        message:
                          $ref: '#/components/schemas/message_TRANSACTIONS.risk_assessment.message'
                  batch_id:
                    $ref: '#/components/schemas/batch_id_TRANSACTIONS.batch_id'
                  action:
                    type: object
                    properties:
                      id:
                        $ref: '#/components/schemas/id_TRANSACTIONS.action.id'
                      type:
                        $ref: '#/components/schemas/type_TRANSACTIONS.action.type'
                      time_created:
                        $ref: '#/components/schemas/time_created_TRANSACTIONS.action.time_created'
                      result_code:
                        $ref: '#/components/schemas/result_code_TRANSACTIONS.action.result_code'
                      app_id:
                        $ref: '#/components/schemas/app_id_TRANSACTIONS.action.app_id'
                      app_name:
                        $ref: '#/components/schemas/app_name_TRANSACTIONS.action.app_name'
                x-examples: null
