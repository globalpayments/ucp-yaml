      maxLength: 1
    tag_TRANSACTIONS.payment_method.card.tag:
      type: string
      description: The full card tag data for an EMV/chip card transaction.
      minLength: 1
      maxLength: 500
    chip_condition_TRANSACTIONS.payment_method.card.chip_condition:
      type: string
      enum:
        - PREV_SUCCESS
        - PREV_FAILED
        - NON_CHIP_TRANSACTION
        - UNKNOWN
      description: |-
        Indicates if a fallback mechanism was used to obtain the card information when EMV/chip did not work as expected. 
                             * `PREV_SUCCESS` - indicates the previous transaction with this card was a success. 
                             * `PREV_FAILED` - indicates the previous transaction with this card failed.
                             * `NON_CHIP_TRANSACTION` - indicates this was not a chip transaction.
                             * `UNKNOWN` - indicates the reason is unknown. 
      minLength: 1
      maxLength: 50
      examples:
        - PREV_SUCCESS
    pin_block_TRANSACTIONS.payment_method.card.pin_block:
      type: string
      description: 'Contains the pin block info, relating to the pin code the Payer entered.'
      minLength: 1
      maxLength: 50
    pin_key_serial_number_TRANSACTIONS.payment_method.card.pin_key_serial_number:
      type: string
      title: pin_key_serial_number_TRANSACTIONS.payment_method.card.pin_key_serial_number
      description: 'The key serial number associated with the pin provided. '
      minLength: 1
      maxLength: 50
    account_type_TRANSACTIONS.payment_method.card.account_type:
      type: string
      description: The card providers description of their card product.
      minLength: 1
      maxLength: 50
    cvv_TRANSACTIONS.payment_method.card.cvv:
      type: string
      description: The numeric value printed on the physical card.
      minLength: 3
      maxLength: 4
      examples:
        - 852'
    cvv_indicator_TRANSACTIONS.payment_method.card.cvv_indicator:
      type: string
      enum:
        - ILLEGIBLE
        - NOT_PRESENT
        - PRESENT
      description: |
        Card Verification Value Indicator sent by the Merchant indicating the CVV availability. 
                                  * `ILLEGIBLE` - indicates the cvv is present but cannot be read. 
                                  * `NOT_PRESENT` - indicates the cvv is not present on the card. 
                                  * `PRESENT` - indicates the cvv is present.
      minLength: 1
      maxLength: 50
      examples:
        - PRESENT
    avs_address_TRANSACTIONS.payment_method.card.avs_address:
      type: string
      description: First line of the address associated with the card.
      minLength: 1
      maxLength: 50
    avs_postal_code_TRANSACTIONS.payment_method.card.avs_postal_code:
      type: string
      description: Postal code of the address associated with the card.
      minLength: 1
      maxLength: 50
    funding_TRANSACTIONS.payment_method.card.funding:
      type: string
      enum:
        - DEBIT
        - CREDIT
        - CASH_BENEFITS
        - FOOD_STAMP
        - PREPAID
        - ELECTRONIC_VOUCHER
      description: |
        Indicates how the card is funded:
                                   * `DEBIT` - indicates the card is a debit card where the funds may be present in an account to fulfill the transaction amount. 
                                   * `CREDIT` - indicates the card is a credit card where the funds may be available on credit to the payer to fulfill the transaction amount.
                                   * `FOOD_STAMP` - indicates the card is an, Electronic Benefits Transfer, for food stamps.
                                   * `CASH_BENEFITS` - indicates the card is an, Electronic Benefits Transfer, for cash benefits.
                                   * `PREPAID` - indicates the card is a prepaid card where the funds are loaded to the card account to fulfill the transaction amount. Unlike a debit card, a prepaid is not linked to a bank account.
                                   * `ELECTRONIC_VOUCHER` - indicates that card is an electronic voucher which requires a voucher code and number to fulfill the transaction
      minLength: 1
      maxLength: 50
      examples:
        - CREDIT
    authcode_TRANSACTIONS.payment_method.card.authcode:
