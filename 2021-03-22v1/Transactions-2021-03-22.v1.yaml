      examples:
        - '123456789012345'
    voucher_code_TRANSACTIONS.payment_method.card.voucher_code:
      type: string
      description: The voucher code associated with the Electronic Voucher card
      examples:
        - '1234'
    brand_reference_TRANSACTIONS.payment_method.card.brand_reference:
      type: string
      description: The unique reference created by the brands/schemes to uniquely identify the transaction.
      minLength: 1
      maxLength: 50
    network_token_TRANSACTIONS.payment_method.card.network_token:
