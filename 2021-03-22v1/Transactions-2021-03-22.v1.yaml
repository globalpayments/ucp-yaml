        - DUTY
        - ALTERNATE
        - STATE
        - HST
        - GST
        - QST
        - SHIPPING
      title: type_TRANSACTIONS.order.taxes.type
      description: |-
        The type of tax being charged.
          * `VAT` -  Value-added tax
          * `NATIONAL` -  National tax.
          * `SERVICE` - Service tax.
          * `DUTY` -  Duty tax or sometimes referred to as a tariff.
          * `STATE` -  State or provinical tax.
          * `HST` -  Harmonized sales tax. 
          * `GST` -  Goods and services tax.
          * `QST` -  Quebec Sales tax.
          * `SHIPPING` -  Shipping tax.
          * `ALTERNATE` - Use this option if none of the other tax types apply.
          
