    type_TRANSACTIONS.action.type:
      type: string
      enum:
        - ADJUST
        - AUTHORIZE
        - CAPTURE
        - CONFIRM
        - FORCE
        - INCREMENT
        - INITIATE
        - MULTIPLE_CAPTURE
        - PREAUTHORIZE
        - PREAUTHORIZE_MULTIPLE_CAPTURE
        - REAUTHORIZATION
        - REDIRECT_FROM
        - REDIRECT_TO
        - REFUND
        - HOLD
        - RELEASE
        - REVERSE
        - SPLIT
        - STATUS_NOTIFICATION
        - TRANSACTION_LIST
        - TRANSACTION_SINGLE
      description: Indicates the specific action taken.
      minLength: 1
      maxLength: 50
      examples:
        - AUTHORIZE
    time_created_TRANSACTIONS.action.time_created:
      type: string
      description: Global Payments time indicating when the object was created in ISO-8601 format.
      minLength: 1
      maxLength: 50
      examples:
        - '2026-05-03T21:23:39.718Z'
    result_code_TRANSACTIONS.action.result_code:
      type: string
      enum:
        - SUCCESS
        - DECLINED
        - PENDING
        - ERROR
      description: |-
        The result of the action executed. * `SUCCESS` - indicates the action executed successfully.
        * `DECLINED` - indicates the result of the action was to DECLINE it. This means to consider that payment is not allowed and goods or services should not be provided. For transaction processing this means the payment method declined the transaction.
        * `PENDING` - indicates the result is not known but a final result will be subsequently provided. When the result is known the value can be updated to a SUCCESS, DECLINED or ERROR code.
        * `ERROR` - indicates the action was PENDING but when the final result was known, it had errored.
      minLength: 1
      maxLength: 50
      examples:
        - SUCCESS
