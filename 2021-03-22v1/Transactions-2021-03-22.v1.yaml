  '/transactions/{id}/hold':
    post:
      tags:
        - Hold a Transaction
      summary: |
        This request will change the transaction status to PENDING_REVIEW (HELD). 
      description: |
        This request will change the transaction status to PENDING_REVIEW (HELD). If the transaction was successful and due to be included in the next settlement file, this will prevent its inclusion until such a time that the transaction is released. 
        If you're using Delayed Capture (the original capture_mode is set to LATER), the transaction must be released and then captured before it will be batched. This functionality is only available for Card Not Present (CNP) transactions in the UK, US, CA and EU.
      operationId: post-transactions-id-hold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - $ref: '#/components/parameters/Authorization'
        - $ref: '#/components/parameters/X-GP-Idempotency'
        - $ref: '#/components/parameters/X-GP-Version'
        - $ref: '#/components/parameters/Content-type'
        - $ref: '#/components/parameters/Accept'
      requestBody:
        description: ''
        content:
          application/json:
            schema:
              type: object
              properties:
                reason_code:
                  $ref: '#/components/schemas/reason_code_TRANSACTIONS.reason_code'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    $ref: '#/components/schemas/id_TRANSACTIONS.id'
                  time_created:
                    $ref: '#/components/schemas/time_created_TRANSACTIONS.time_created'
                  type:
                    $ref: '#/components/schemas/type_TRANSACTIONS.type'
                  status:
                    $ref: '#/components/schemas/status_TRANSACTIONS.status'
                  amount:
                    $ref: '#/components/schemas/amount_TRANSACTIONS.amount'
                  currency:
                    $ref: '#/components/schemas/currency_TRANSACTIONS.currency'
                  country:
                    $ref: '#/components/schemas/country_TRANSACTIONS.country'
                  reference:
                    $ref: '#/components/schemas/reference_TRANSACTIONS.reference'
                  risk_assessment:
                    type: array
                    items:
                      type: object
                      properties:
