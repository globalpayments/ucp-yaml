      type: string
      enum:
        - ACTIVE
        - PASSIVE
        - 'OFF'
      description: |
        The overall fraud mode, indicating whether the impact of running the fraud rules for this transaction.
        * `ACTIVE` - The fraud rules were executed and the result can HOLD or BLOCK a transaction 
        * `PASSIVE` - The fraud rules were executed but the result cannot affect the status of the transaction. 
        * `OFF`  - The fraud rules were not executed.
      minLength: 1
      maxLength: 50
      examples:
        - ACTIVE
    result_TRANSACTIONS.risk_assessment.result:
      type: string
      enum:
        - ACCEPTED
        - REJECTED
        - NOT_EXECUTED
        - PENDING_REVIEW
        - HOLD_SUCCESSFUL
        - RELEASE_SUCCESSFUL
      description: The overall result of the fraud rules executed for this transaction.
      minLength: 1
      maxLength: 50
      examples:
        - ACCEPTED
    description_TRANSACTIONS.risk_assessment.rules.description:
      type: string
      description: 'This describes the fraud rule and indicates what rule was specifically executed so it is understandable,'
      minLength: 1
      maxLength: 50
    result_TRANSACTIONS.risk_assessment.rules.result:
      type: string
      enum:
        - ACCEPTED
        - REJECTED
        - NOT_EXECUTED
