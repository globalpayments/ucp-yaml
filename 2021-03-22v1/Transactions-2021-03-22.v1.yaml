    location_TRANSACTIONS.device.capabilities.location:
      type: string
      enum:
        - ON_MERCHANT_PREMISES
        - OFF_MERCHANT_PREMISES
        - OFF_MERCHANT_PREMISES_MPOS
        - ON_MERCHANT_PREMISES_MPOS
        - OFF_MERCHANT_PREMISES_PAYER_POS
        - ON_MERCHANT_PREMISES_PAYER_POS
        - OFF_PAYER_PREMISES
        - ON_PAYER_PREMISES
        - UNKNOWN
      title: location_TRANSACTIONS.device.capabilities.location
      description: |-
        Describes the location where the device is being used. 

        * `ON_MERCHANT_PREMISIS` - The transaction took place on the merchant's premesis. This value should be used for EMV contact transactions and must be provided in conjuction with an attendance_mode.
        * `OFF_MERCHANT_PREMISIS` - The transaction took place away from the merchant's premesis. This value should be used for EMV contact transactions and must be provided in conjuction with an attendance_mode.
        * `ON_PAYER_PREMISIS` - The transaction took place on the payer's premesis. This value can be used for EMV contact or EMV contactless transactions and must be provided in conjuction with an attendance_mode.
        * `OFF_PAYER_PREMISIS` - The transaction took place away from the payer's premesis. This value can be used for EMV contact or EMV contactless transactions and must be provided in conjuction with an attendance_mode.
        * `ON_MERCHANT_PREMISES_MPOS` - The transaction took place on the merchant's premesis, using the merchant's mobile POS solution. Attendance_mode should not be sent when providing this location. 
        * `OFF_MERCHANT_PREMISES_MPOS` - The transaction took place away from the merchant's premesis, and used the merchant's mobile POS solution. Attendance_mode should not be sent when providing this location. 
        * `ON_MERCHANT_PREMISES_PAYER_POS` - The transaction took place away from the merchant's premesis, and used the merchant's mobile POS solution. Attendance_mode should not be sent when providing this location. 
        * `OFF_MERCHANT_PREMISES_PAYER_POS` - The transaction took place away from the merchant's premesis, and used the merchant's mobile POS solution. Attendance_mode should not be sent when providing this location. 
        * `UNKNOWN` - The transaction took place at an unknown location. 
