        Indicates how the card is funded
            * `DEBIT` - indicates the card is a debit card where the funds may be present in an account to fulfill the transaction amount. 
            * `CREDIT` - indicates the card is a credit card where the funds may be available on credit to the payer to fulfill the transaction amount.
                                  
      minLength: 1
      maxLength: 50
    total_amount_TRANSACTIONS.order.discounts.total_amount:
      type: string
      description: The total transaction discount amount.
      minLength: 1
      maxLength: 50
    name_TRANSACTIONS.order.discounts.name:
      type: string
      description: The name of the discount applied to the transaction.This field is used for reporting.
      minLength: 1
      maxLength: 50
    amount_TRANSACTIONS.order.discounts.amount:
      type: string
      description: The dollar amount of discount applied to a transaction. Corresponds with total_amount.
      minLength: 1
      maxLength: 50
    percentage_TRANSACTIONS.order.discounts.percentage:
      type: string
      description: The discount percentage applied to a transaction. Corresponds with transDiscountName. This does not impact transaction functionality. It is used for reporting purposes.
      minLength: 1
      maxLength: 50
    priority_order_TRANSACTIONS.order.discounts.priority_order:
      type: string
      description: Indicates the priority order in which discounts are applied at both the order and product levels.
      minLength: 1
      maxLength: 50
    usage_mode_TRANSACTIONS.order.discounts.usage_mode:
      type: string
      enum:
        - SINGLE
        - MULTIPLE
      description: Indicates if the discount can be stacked with other discounts.
      minLength: 1
      maxLength: 50
    id_TRANSACTIONS.currency_conversion.id:
      type: string
      description: A unique identifier that is used to identify and reference an instance of this resource. It is generated by Global Payments to identify the currency conversion details used with this transaction.
      minLength: 1
      maxLength: 50
      examples:
        - CCS_6a061b51-6e7a-4200-9d8c-01be5e26a5bb
    initiator_TRANSACTIONS.initiator:
      type: string
      enum:
        - PAYER
        - MERCHANT
      description: |
        Indicates whether the Merchant or the Payer initiated the creation of a transaction. 
                             * `PAYER` - The transaction was initiated by the customer who is paying the merchant. 
                             * `MERCHANT` - The transaction was initiated by the merchant, who is getting paid by the payer.
      minLength: 1
      maxLength: 50
      examples:
        - PAYER
    contract_reference_TRANSACTIONS.stored_credential.contract_reference:
      type: string
      description: This is a Merchant defined reference used to identify the recurring transaction. This is required in Mexico and represents the agreement id between the merchant and the cardholder for a specific subscription or recurring charge.
    model_TRANSACTIONS.stored_credential.model:
      type: string
      enum:
        - UNSCHEDULED
        - RECURRING
        - SUBSCRIPTION
        - INSTALLMENT
        - PARTIAL_SHIPMENT
        - THIRD_PARTY_INSTALLMENT
        - ISSUER_INSTALLMENT
      description: |
        Indicates the transaction processing model being executed when using stored credentials. 
                                 * `UNSCHEDULED` - the transaction is ad hoc or unscheduled. For example a payer visiting a merchant to make purchase using the payment method stored with the merchant. 
                                 * `RECURRING` - The transaction is a repeat transaction initiated by the merchant and taken using the payment method stored with the merchant, as part of an agreed schedule of transactions. 
                                 * `SUBSCRIPTION` - The transaction is a repeat transaction initiated by the merchant and taken using the payment method stored with the merchant, as part of an agreed schedule of transactions. The amount taken is based on the usage by the payer of the good or service. for example a monthly mobile phone bill. 
                                 *  `INSTALLMENT` - The transaction is a repeat transaction initiated by the merchant and taken using the payment method stored with the merchant, as part of an agreed schedule of transactions and where the amount is known and agreed in advanced. For example the payment in full of a good in fixed installments over a defined period of time.
                                 * `PARTIAL_SHIPMENT` - the transaction is initiated by the merchant to capture payment for a portion of the order that is shipped or fulfilled. Multiple transactions may occur against the same original authorization as goods or services are delivered in parts. 
                                 * `THIRD_PARTY_INSTALLMENT` - The transaction is initiated by the merchant as part of an installment payment plan administered by a third party provider. 
                                 *  `ISSUER_INSTALLMENT` - The transaction is initiated by the merchant for a payment that has been converted into an installment plan by the card issuer. The merchant processes transactions according to installment terms defined by the issuer. 
      minLength: 1
      maxLength: 50
      examples:
        - RECURRING
    reason_TRANSACTIONS.stored_credential.reason:
      type: string
      enum:
        - INCREMENTAL
        - RESUBMISSION
        - REAUTHORIZATION
        - DELAYED
        - NO_SHOW
      description: The reason stored credentials are being used to to create a transaction.
      minLength: 1
      maxLength: 50
      examples:
        - INCREMENTAL
    sequence_TRANSACTIONS.stored_credential.sequence:
      type: string
      enum:
        - FIRST
        - SUBSEQUENT
        - LAST
      description: 'Indicates the order of this transaction in the sequence of a planned, repeating transaction processing model.'
      minLength: 1
      maxLength: 50
      examples:
        - SUBSEQUENT
    return_url_TRANSACTIONS.notifications.return_url:
      type: string
      description: 'The merchant URL to return the payer to, once the payer has completed payment using the payment method. This returns control of the payer''s payment experience to the merchant.'
    status_url_TRANSACTIONS.notifications.status_url:
      type: string
      description: Indicates to Global Payments where the merchant wants to receive notifications of certain status events that occur on the Global Payments system.
    challenge_return_url_TRANSACTIONS.notifications.challenge_return_url:
      type: string
      description: The merchant URL that will receive the notification when the customer has completed the authentication challenge process.
    three_ds_method_return_url_TRANSACTIONS.notifications.three_ds_method_return_url:
      type: string
      description: The merchant URL that will receive the notification when the 3DS ACS successfully gathers device information.
    decoupled_challenge_return_url_TRANSACTIONS.notifications.decoupled_challenge_return_url:
      type: string
      description: The merchant URL that will receive the notification when the customer has completed the authentication when the authentication is decoupled and separate to the purchase.
    id_TRANSACTIONS.payer.id:
      type: string
      description: Unique identifier for the Payer on the Global Payments system.
      maxLength: 50
      examples:
        - PYR_oOAH6BClraQWS3Qy07dh7tZAN3X2nW
    first_name_TRANSACTIONS.payer.first_name:
      type: string
      description: The first name of the Payer
      minLength: 1
      maxLength: 50
      examples:
        - John
    last_name_TRANSACTIONS.payer.last_name:
      type: string
      description: The last name of the Payer
      minLength: 1
      maxLength: 50
      examples:
        - James
    reference_TRANSACTIONS.payer.reference:
      type: string
      description: An integrator's reference to the payer.
      minLength: 1
      maxLength: 50
    storage_mode_TRANSACTIONS.payer.storage_mode:
      type: string
      enum:
        - ON_SUCCESS
        - ALWAYS
      description: Indicates whether to store the payer as part of a transaction.
      examples:
        - ON_SUCCESS
    email_TRANSACTIONS.payer.email:
      type: string
      description: The email address of the payer.
      minLength: 1
      maxLength: 50
    language_TRANSACTIONS.payer.language:
      type: string
      description: The preferred language of the payer. In the format ISO-639-1 (alpha-2) or ISO-639-1 (alpha-2)_ISO-3166(alpha-2)
      examples:
        - en
